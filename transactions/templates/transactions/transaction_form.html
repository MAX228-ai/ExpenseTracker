{% extends "base.html" %}
{% block title %}{{ form_title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h4 class="mb-4 fw-bold">
                <i class="bi bi-pencil-square text-primary"></i> {{ form_title }}
            </h4>

            <form method="post" novalidate>
                {% csrf_token %}

                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            {{ field.label }}
                            {% if field.field.required %}
                                <span class="text-danger">*</span>
                            {% endif %}
                        </label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">
                                {% for error in field.errors %}
                                    <div><i class="bi bi-exclamation-circle"></i> {{ error }}</div>
                                {% endfor %}
                            </div>
                        {% endif %}
                    </div>
                {% endfor %}

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> {{ btn_label }}
                    </button>
                    <a href="{% url 'transaction_list' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Atcelt
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
