{% extends "base.html" %}
{% block title %}Transakcijas dzēšana{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 text-center">
            <div class="text-danger mb-3">
                <i class="bi bi-trash-fill" style="font-size: 3rem;"></i>
            </div>
            <h4 class="fw-bold mb-2">Dzēst transakciju?</h4>
            <p class="text-muted mb-4">
                <strong>{{ object }}</strong>
                <br>Šo darbību nevar atsaukt.
            </p>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-center">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Jā, dzēst
                    </button>
                    <a href="{% url 'transaction_list' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Atcelt
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
